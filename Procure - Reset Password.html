<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Nomni Procure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; -webkit-font-smoothing: antialiased; }

    .page {
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    /* ── Panel ── */
    .login-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 50px;
      min-height: 0;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
    }

    .logo-img { height: 32px; width: auto; display: block; }

    .logo-sub {
      color: #2AC864;
      font-weight: 400;
      font-size: 28px;
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      line-height: 1;
    }

    /* ── Form area ── */
    .form-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 21px;
      width: 100%;
    }

    .form-area h1 {
      font-size: 24px;
      font-weight: 700;
      line-height: 30px;
      color: #000;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 400px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field-label {
      font-size: 14px;
      font-weight: 600;
      color: #1a1f2b;
      letter-spacing: -0.1px;
    }

    .pw-wrap { position: relative; }

    .pw-wrap input {
      background: #f4f4f4;
      border: none;
      border-radius: 10px;
      padding: 20px 52px 20px 20px;
      font-size: 16px;
      font-family: inherit;
      color: #000;
      letter-spacing: -0.1px;
      outline: none;
      width: 100%;
      transition: background .15s;
    }

    .pw-wrap input::placeholder { color: #757575; }
    .pw-wrap input:focus { background: #ebebeb; }
    .pw-wrap input.invalid {
      background: #fdf2f1;
      outline: 1.5px solid #d0291e;
    }

    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9b9fa8;
      display: flex;
      align-items: center;
      padding: 4px;
      transition: color .15s;
    }
    .pw-toggle:hover { color: #1a1f2b; }
    .pw-toggle svg { width: 20px; height: 20px; display: block; }

    .field-error {
      font-size: 13px;
      color: #d0291e;
      letter-spacing: -0.1px;
      display: none;
      line-height: 18px;
    }

    .btn-submit {
      background: #2AC864;
      border: none;
      border-radius: 10px;
      padding: 20px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      color: #000;
      letter-spacing: -0.1px;
      text-align: center;
      cursor: pointer;
      width: 100%;
      transition: background .15s, color .15s;
    }
    .btn-submit:hover { background: #0E3727; color: #2AC864; }
    .btn-submit:active { background: #0a2a1e; color: #2AC864; }

    /* ── Success state ── */
    .success-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .success-icon {
      width: 60px;
      height: 60px;
      background: #F5B731;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .success-icon svg { width: 28px; height: 28px; }

    .success-area h1 {
      font-size: 24px;
      font-weight: 700;
      line-height: 32px;
      color: #000;
      max-width: 320px;
    }

    .success-area p {
      font-size: 14px;
      color: #757575;
      line-height: 20px;
      letter-spacing: -0.1px;
      max-width: 300px;
    }

    /* ── Footer ── */
    .login-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .footer-links { display: flex; gap: 24px; }

    .footer-links a {
      font-size: 14px;
      color: #757575;
      letter-spacing: -0.1px;
      text-decoration: none;
    }

    .footer-links a:hover { text-decoration: underline; }

    .part-of {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #0e3727;
      letter-spacing: -0.1px;
    }

    .part-of img { height: 20px; width: auto; }

    /* Font inspector */
    .font-inspector-btn {
      position: fixed; top: 12px; right: 16px; z-index: 1000;
      background: rgba(0,0,0,.15); border: 1px solid rgba(0,0,0,.12);
      color: rgba(0,0,0,.45); cursor: pointer;
      display: inline-flex; align-items: center;
      padding: 3px 8px; border-radius: 6px;
      transition: background .15s, color .15s;
      font-size: 11px; font-weight: 700; font-family: monospace; letter-spacing: .03em;
    }
    .font-inspector-btn:hover { background: rgba(0,0,0,.3); color: #000; }
    .font-inspector-btn.active { background: #1a1f2b; color: #fff; border-color: #1a1f2b; }
    #font-inspector-tip {
      position: fixed; background: #1a1f2b; color: #fff;
      font-size: 11px; font-weight: 600; font-family: monospace;
      padding: 3px 8px; border-radius: 4px; pointer-events: none;
      z-index: 99999; display: none; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.3); letter-spacing: .02em;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="login-panel">

    <div class="logo">
      <img class="logo-img" src="assets/nomni_full.svg" alt="nomni">
      <div class="logo-sub">Procure</div>
    </div>

    <!-- Form view -->
    <div class="form-area" id="formView">
      <h1>Change your password</h1>
      <div class="fields">

        <div class="field-group">
          <label class="field-label" for="pwNew">New password</label>
          <div class="pw-wrap">
            <input type="password" id="pwNew" placeholder="Enter new password" autocomplete="new-password" oninput="clearError('pwNew','pwNewError')">
            <button type="button" class="pw-toggle" onclick="togglePw('pwNew',this)" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" id="pwNewError">Min. 8 characters, incl. letters, numbers, special characters.</span>
        </div>

        <div class="field-group">
          <label class="field-label" for="pwConfirm">Confirm new password</label>
          <div class="pw-wrap">
            <input type="password" id="pwConfirm" placeholder="Re-enter new password" autocomplete="new-password" oninput="clearError('pwConfirm','pwConfirmError')">
            <button type="button" class="pw-toggle" onclick="togglePw('pwConfirm',this)" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" id="pwConfirmError">Doesn't match the new password</span>
        </div>

        <button class="btn-submit" onclick="submitPw()">Submit new password</button>

      </div>
    </div>

    <!-- Success view -->
    <div class="form-area" id="successView" style="display:none;">
      <div class="success-area">
        <div class="success-icon">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.25 14.875L10.5 20.125L22.75 7.875" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>Your password has been updated</h1>
        <p>For security, you have been logged out. Please log in again.</p>
        <button class="btn-submit" onclick="location.href='Procure - Login.html'" style="margin-top:8px">Log in now</button>
      </div>
    </div>

    <div class="login-footer">
      <div class="footer-links">
        <a href="https://www.nomni.ai/terms" target="_blank">Terms of use</a>
        <a href="https://www.nomni.ai/privacy" target="_blank">Privacy Policy</a>
      </div>
      <div class="part-of">
        Part of
        <a href="https://www.nomni.ai" target="_blank" style="display:inline-flex;align-items:center"><img src="assets/nomni_full.svg" alt="nomni"></a>
      </div>
    </div>

  </div>
</div>

<script>
  function submitPw() {
    var pwNew = document.getElementById('pwNew');
    var pwConfirm = document.getElementById('pwConfirm');
    var valid = true;

    var pw = pwNew.value;
    var pwMeetsRules = pw.length >= 8
      && /[a-zA-Z]/.test(pw)
      && /[0-9]/.test(pw)
      && /[^a-zA-Z0-9]/.test(pw);

    if (!pwMeetsRules) {
      pwNew.classList.add('invalid');
      document.getElementById('pwNewError').style.display = 'block';
      valid = false;
    }

    var confirms = pwConfirm.value !== '' && pwConfirm.value === pwNew.value;
    if (!confirms) {
      pwConfirm.classList.add('invalid');
      document.getElementById('pwConfirmError').style.display = 'block';
      valid = false;
    }

    if (valid) {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = '';
    }
  }

  function clearError(inputId, errorId) {
    document.getElementById(inputId).classList.remove('invalid');
    document.getElementById(errorId).style.display = 'none';
  }

  function togglePw(inputId, btn) {
    var input = document.getElementById(inputId);
    var showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    btn.innerHTML = showing
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  }
</script>

<button class="font-inspector-btn" id="fontInspectorBtn" title="Font size inspector">Aa</button>
<div id="font-inspector-tip"></div>
<script>
(function(){
  var btn = document.getElementById('fontInspectorBtn');
  var tip = document.getElementById('font-inspector-tip');
  var on = false;
  var tokenMap = {
    '10px': '--text-badge', '11px': '--text-xs', '12px': '--text-sm',
    '14px': '--text-base',  '21px': '--text-heading', '24px': '--text-display'
  };
  var colorMap = {
    'rgb(26, 31, 43)':   '--ink',
    'rgb(138, 143, 152)':'--ink-mute',
    'rgb(199, 201, 207)':'--ink-soft',
    'rgb(26, 128, 64)':  '--spinach',
    'rgb(42, 200, 100)': '--nomni-green',
    'rgb(14, 55, 39)':   '--seaweed',
    'rgb(255, 255, 255)':'white'
  };
  btn.addEventListener('click', function(){
    on = !on;
    btn.classList.toggle('active', on);
    document.body.style.cursor = on ? 'crosshair' : '';
    tip.style.display = 'none';
  });
  document.addEventListener('mousemove', function(e){
    if (!on) return;
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
  });
  document.addEventListener('mouseover', function(e){
    if (!on) return;
    var s = window.getComputedStyle(e.target);
    var fs = s.fontSize; var fw = s.fontWeight; var col = s.color;
    var fsLabel = tokenMap[fs] ? fs + ' · ' + tokenMap[fs] : fs;
    var colLabel = colorMap[col] || (function(c){
      var m = c.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
      if (!m) return c;
      return '#' + [m[1],m[2],m[3]].map(function(n){ return (+n).toString(16).padStart(2,'0'); }).join('');
    })(col);
    tip.textContent = fsLabel + ' · ' + fw + ' · ' + colLabel;
    tip.style.display = 'block';
  });
  document.addEventListener('mouseleave', function(){ tip.style.display = 'none'; });
})();
</script>
</body>
</html>
