<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Nomni Procure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; -webkit-font-smoothing: antialiased; }

    .page {
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Announcement banner ── */
    .banner {
      background: #2AC864;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 14px 20px;
      flex-shrink: 0;
    }

    .banner-text {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.1px;
      color: #000;
      white-space: nowrap;
    }

    .banner-text strong { font-weight: 700; }
    .banner-text a { color: #000; }

    /* ── Main ── */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Login panel ── */
    .login-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 50px;
      background: #fff;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
    }

    .logo-img { height: 32px; width: auto; display: block; }

    .logo-sub {
      color: #2AC864;
      font-weight: 400;
      font-size: 28px;
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      line-height: 1;
    }

    /* Form area */
    .form-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 21px;
      width: 100%;
    }

    .form-area h1 {
      font-size: 24px;
      font-weight: 700;
      line-height: 30px;
      color: #000;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 400px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fields input {
      background: #f4f4f4;
      border: none;
      border-radius: 10px;
      padding: 20px;
      font-size: 16px;
      font-family: inherit;
      color: #000;
      letter-spacing: -0.1px;
      outline: none;
      width: 100%;
      transition: background .15s;
    }

    .fields input::placeholder { color: #757575; }
    .fields input:focus { background: #ebebeb; }

    .btn-login {
      background: #2AC864;
      border: none;
      border-radius: 10px;
      padding: 20px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      color: #000;
      letter-spacing: -0.1px;
      text-align: center;
      cursor: pointer;
      width: 100%;
      transition: background .15s;
    }

    .btn-login:hover { background: #22b358; }
    .btn-login:active { background: #1da04e; }

    .forgot-link {
      font-size: 14px;
      color: #757575;
      text-align: center;
      letter-spacing: -0.1px;
      text-decoration: none;
      display: block;
    }

    .forgot-link:hover { text-decoration: underline; }

    /* Footer */
    .login-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      font-size: 14px;
      color: #757575;
      letter-spacing: -0.1px;
      text-decoration: none;
    }

    .footer-links a:hover { text-decoration: underline; }

    .part-of {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #0e3727;
      letter-spacing: -0.1px;
    }

    .part-of img { height: 20px; width: auto; }

    /* ── Image panel ── */
    .image-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #b05ec0;
    }

    .kitchen-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      pointer-events: none;
    }

    .gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(198deg, rgba(0,0,0,0) 47%, rgba(0,0,0,0.92) 97%);
      z-index: 1;
    }

    .image-text {
      position: absolute;
      bottom: 56px;
      left: 40px;
      z-index: 2;
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 96px;
      line-height: 82px;
      letter-spacing: -1px;
      font-variation-settings: 'SOFT' 100, 'WONK' 1;
      max-width: 460px;
    }

    .image-text .line-white {
      color: #fff;
      display: block;
    }

    .image-text .line-green {
      color: #2AC864;
      display: block;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Announcement banner -->
    <div class="banner">
      <span class="banner-text">
        <strong>zeemart</strong> is now Nomni Procure!
        <a href="#">Read the announcement</a>
      </span>
    </div>

    <div class="main">

      <!-- Login panel -->
      <div class="login-panel">

        <div class="logo">
          <img class="logo-img" src="assets/nomni_full.svg" alt="nomni">
          <div class="logo-sub">Procure</div>
        </div>

        <div class="form-area">
          <h1>Welcome back</h1>
          <div class="fields">
            <div class="field-group">
              <input type="email" placeholder="Email address" autocomplete="email">
              <input type="password" placeholder="Password" autocomplete="current-password">
              <button class="btn-login" onclick="location.href='Procure - Dashboard.html'">Log in</button>
            </div>
            <a href="Procure - Forgot Password.html" class="forgot-link">Forgot password?</a>
          </div>
        </div>

        <div class="login-footer">
          <div class="footer-links">
            <a href="#">Terms of use</a>
            <a href="#">Privacy Policy</a>
          </div>
          <div class="part-of">
            Part of
            <img src="assets/nomni_full.svg" alt="nomni">
          </div>
        </div>

      </div>

      <!-- Image panel -->
      <div class="image-panel">
        <img class="kitchen-img" src="https://www.figma.com/api/mcp/asset/5b5e9da4-9568-447d-ab86-e486d6fff077" alt="">
        <div class="gradient"></div>
        <div class="image-text">
          <span class="line-white">Run your<br>kitchen.</span>
          <span class="line-green">Not your<br>paperwork.</span>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
